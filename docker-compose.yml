version: "3.8"

services:
  # 1. Database — boots first, everyone waits for it
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: avia_tickets
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d avia_tickets"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # 2. Backend — runs migrations + seed via entrypoint, then serves on :3001
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/avia_tickets
      PORT: "3001"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production}
      JWT_EXPIRES_IN: "7d"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/flights || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # 3. Frontend — only starts after backend is actually serving requests
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:3001
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
