<!doctype html>
<html><head><meta charset="utf-8"><title>auth helper</title></head>
<body><script>
const t = new URL(location.href).searchParams.get("t");
const u = new URL(location.href).searchParams.get("u");
if (t) localStorage.setItem("avia.token", t);
if (u) localStorage.setItem("avia.user", decodeURIComponent(u));
location.replace("/account");
</script></body></html>
